baseURL = 'https://helloliying.github.io/knowledge-planet/'
languageCode = 'zh-CN'
title = '知识星球'
theme = 'knowledge'
defaultContentLanguage = 'zh-cn'
hasCJKLanguage = true
enableRobotsTXT = true
enableEmoji = true
paginate = 10

[params]
  author = 'Lee'
  description = '个人知识管理星球 - 记录、分享、成长'
  dateFormat = '2006-01-02'
  showReadingTime = true
  showWordCount = true
  
  # 社交分享按钮
  shareButtons = ['twitter', 'linkedin', 'reddit', 'telegram', 'whatsapp']
  
  # 评论系统配置（后续添加）
  utterances = false
  utterancesRepo = 'helloliying/knowledge-planet-comments'
  utterancesIssueTerm = 'pathname'
  utterancesTheme = 'github-light'

[languages.zh-cn]
  languageName = '中文'
  weight = 1

[menu]
  [[menu.main]]
    identifier = 'home'
    name = '首页'
    url = '/'
    weight = 1
    
  [[menu.main]]
    identifier = 'posts'
    name = '文章'
    url = '/posts/'
    weight = 2
    
  [[menu.main]]
    identifier = 'categories'
    name = '分类'
    url = '/categories/'
    weight = 3
    
  [[menu.main]]
    identifier = 'tags'
    name = '标签'
    url = '/tags/'
    weight = 4
    
  [[menu.main]]
    identifier = 'about'
    name = '关于'
    url = '/about/'
    weight = 5

# 输出配置
[outputs]
  home = ['HTML', 'RSS', 'JSON']
  page = ['HTML']
  section = ['HTML']
  taxonomy = ['HTML']
  term = ['HTML']

# 禁用不需要的功能
disableKinds = []