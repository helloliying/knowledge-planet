<!doctype html><html lang=zh-CN><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1"><title>安全监控仪表板 - 知识星球</title>
<meta http-equiv=Cache-Control content="no-cache, no-store, must-revalidate"><meta http-equiv=Pragma content="no-cache"><meta http-equiv=Expires content="0"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding:15px;margin:0}.dashboard-title-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:15px;border-bottom:1px solid #334155}.dashboard-title{display:flex;align-items:center;gap:10px}.dashboard-title h1{font-size:1.5rem;color:#60a5fa;font-weight:600}.dashboard-subtitle{color:#94a3b8;font-size:.9rem}.status-indicator{display:flex;align-items:center;gap:8px;background:rgba(96,165,250,.1);padding:6px 12px;border-radius:20px;border:1px solid rgba(96,165,250,.3)}.live-dot{width:8px;height:8px;background:#10b981;border-radius:50%;animation:pulse 2s infinite}@keyframes pulse{0%{opacity:1}50%{opacity:.5}100%{opacity:1}}.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}.stat-card{background:#1e293b;border-radius:10px;padding:15px;border:1px solid #334155;transition:transform .2s}.stat-card:hover{transform:translateY(-2px);border-color:#60a5fa}.stat-label{color:#94a3b8;font-size:.8rem;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}.stat-value{font-size:1.8rem;font-weight:700;color:#60a5fa;line-height:1}.chart-section{background:#1e293b;border-radius:10px;padding:15px;margin-bottom:15px;border:1px solid #334155}.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.chart-header h2{font-size:1.1rem;color:#e2e8f0;font-weight:600}.chart-container{position:relative;width:100%}#trajectory-chart{height:200px;width:100%}#distribution-chart{height:150px;width:100%}.control-panel{background:#1e293b;border-radius:10px;padding:15px;margin-bottom:15px;border:1px solid #334155}.control-panel h2{font-size:1.1rem;color:#e2e8f0;margin-bottom:12px;font-weight:600}.button-group{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:15px}.btn{padding:8px 16px;border:none;border-radius:6px;font-weight:600;font-size:.85rem;cursor:pointer;transition:all .2s}.btn-primary{background:#2563eb;color:#fff}.btn-primary:hover{background:#1d4ed8}.btn-secondary{background:#334155;color:#e2e8f0;border:1px solid #475569}.btn-secondary:hover{background:#475569}.btn-success{background:#10b981;color:#fff}.btn-success:hover{background:#0da271}.data-preview{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:12px;font-family:monaco,consolas,monospace;font-size:.8rem;max-height:200px;overflow-y:auto;margin-top:10px}.config-item{margin-bottom:12px;padding:10px;background:#0f172a;border-radius:6px}.config-item label{display:block;margin-bottom:5px;color:#94a3b8;font-size:.85rem}.config-item input[type=range]{width:100%;margin:5px 0}.config-item input[type=number]{width:100px;padding:5px;background:#0f172a;border:1px solid #334155;border-radius:4px;color:#e2e8f0}@media(max-width:768px){.dashboard-title-bar{flex-direction:column;align-items:flex-start;gap:10px}.stats-grid{grid-template-columns:repeat(2,1fr)}.button-group{flex-direction:column}.btn{width:100%}}@media(max-width:480px){.stats-grid{grid-template-columns:1fr}#trajectory-chart{height:180px}#distribution-chart{height:130px}}.debug-info{position:fixed;bottom:10px;right:10px;background:rgba(0,0,0,.8);color:#10b981;padding:8px 12px;border-radius:6px;font-size:.75rem;font-family:monaco,consolas,monospace;z-index:1000;max-width:300px;display:none}</style></head><body><div class=dashboard-title-bar><div class=dashboard-title><h1>🔒 安全监控仪表板</h1><span class=dashboard-subtitle>试验环境 - 完整行为记录</span></div><div class=status-indicator><span class=live-dot></span>
<span>实时监控中</span></div></div><div class=stats-grid id=live-stats></div><div class=chart-section><div class=chart-header><h2>📈 鼠标轨迹</h2></div><div class=chart-container><canvas id=trajectory-chart></canvas></div></div><div class=chart-section><div class=chart-header><h2>📊 事件分布</h2></div><div class=chart-container><canvas id=distribution-chart></canvas></div></div><div class=control-panel><h2>🎮 数据管理</h2><div class=button-group><button onclick=exportData() class="btn btn-primary">导出数据</button>

<button onclick=clearData() class="btn btn-secondary">清空数据</button>
<button onclick=refreshStats() class="btn btn-secondary">刷新统计</button></div><div><h3 style=font-size:.9rem;color:#94a3b8;margin-bottom:8px>数据预览</h3><div class=data-preview id=data-preview>点击"导出数据"查看完整数据</div></div></div><div class=control-panel><h2>⚙️ 监控配置</h2><div class=config-item><label><input type=checkbox id=enable-monitoring checked onchange=toggleMonitoring()>
启用完整监控</label></div><div class=config-item><label>采样间隔: <span id=interval-value>20</span>ms
<input type=range id=sample-interval min=10 max=100 value=20 oninput=updateSampleInterval()></label></div><div class=config-item><label>最大记录数:
<input type=number id=max-records value=10000 min=100 max=50000 onchange=updateMaxRecords()></label></div></div><div class=debug-info id=debug-info></div><script src="../js/security-monitor.js?v=20260319.1654"></script><script src="../js/trajectory-tracker.js?v=20260319.1654"></script><script src=https://cdn.jsdelivr.net/npm/chart.js></script><script>let trajectoryChart=null,distributionChart=null,updateInterval=null;function debug(e){console.log("[仪表板]",e);const t=document.getElementById("debug-info");t&&(t.textContent=e,t.style.display="block",setTimeout(()=>t.style.display="none",3e3))}function initDashboard(){if(debug("初始化仪表板..."),typeof Chart=="undefined"){debug("错误: Chart.js未加载");return}if(!window.TrajectoryTracker){debug("错误: 轨迹跟踪器未加载");return}try{window.KnowledgePlanetSecurity&&window.KnowledgePlanetSecurity.init(),window.TrajectoryTracker.init(),debug("监控系统已启动")}catch(e){debug("初始化错误: "+e.message);return}initCharts(),startLiveUpdates(),updateConfigDisplay(),debug("仪表板准备就绪")}function initCharts(){const e=document.getElementById("trajectory-chart");if(e){const t=e.getContext("2d");trajectoryChart=new Chart(t,{type:"scatter",data:{datasets:[{label:"鼠标轨迹",data:[],backgroundColor:"rgba(96, 165, 250, 0.3)",borderColor:"rgba(96, 165, 250, 0.8)",borderWidth:1,pointRadius:2}]},options:{responsive:!0,maintainAspectRatio:!1,scales:{x:{type:"linear",position:"bottom",grid:{color:"#334155"},ticks:{color:"#94a3b8"}},y:{reverse:!0,grid:{color:"#334155"},ticks:{color:"#94a3b8"}}},plugins:{legend:{display:!1}}}})}const t=document.getElementById("distribution-chart");if(t){const e=t.getContext("2d");distributionChart=new Chart(e,{type:"doughnut",data:{labels:["鼠标移动","点击","滚动","键盘","其他"],datasets:[{data:[0,0,0,0,0],backgroundColor:["#60a5fa","#10b981","#f59e0b","#8b5cf6","#64748b"],borderWidth:0}]},options:{responsive:!0,maintainAspectRatio:!1,plugins:{legend:{position:"bottom",labels:{color:"#94a3b8",font:{size:10}}}}}})}debug("图表初始化完成")}function startLiveUpdates(){updateInterval&&clearInterval(updateInterval),updateInterval=setInterval(updateDashboard,1e3),updateDashboard(),debug("实时更新已启动")}function updateDashboard(){if(!window.TrajectoryTracker)return;const e=window.TrajectoryTracker.getStats(),t=window.TrajectoryTracker.getStream();updateStatsCards(e),updateTrajectoryChart(t),updateDistributionChart(e)}function updateStatsCards(e){const t=document.getElementById("live-stats");if(!t)return;t.innerHTML=`
                <div class="stat-card">
                    <div class="stat-label">轨迹记录</div>
                    <div class="stat-value">${e.moves||0}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">点击事件</div>
                    <div class="stat-value">${e.clicks||0}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">滚动事件</div>
                    <div class="stat-value">${e.scrolls||0}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">可疑行为</div>
                    <div class="stat-value">${e.suspicious||0}</div>
                </div>
            `}function updateTrajectoryChart(e){if(!trajectoryChart||!e||e.length===0)return;const t=e.slice(-50),n=t.map(e=>({x:e.x,y:e.y}));trajectoryChart.data.datasets[0].data=n,trajectoryChart.update("none")}function updateDistributionChart(e){if(!distributionChart)return;distributionChart.data.datasets[0].data=[e.moves||0,e.clicks||0,e.scrolls||0,0,Math.max(0,e.totalRecords-(e.moves+e.clicks+e.scrolls))],distributionChart.update("none")}function exportData(){if(!window.TrajectoryTracker){alert("轨迹跟踪器未初始化");return}const t=window.TrajectoryTracker.exportData(),e=document.getElementById("data-preview");e&&(e.textContent=t,e.scrollTop=0),navigator.clipboard.writeText(t).then(()=>{debug("数据已复制到剪贴板")}).catch(e=>{debug("复制失败: "+e.message)})}function downloadData(){if(!window.TrajectoryTracker)return;const n=window.TrajectoryTracker.exportData(),s=new Blob([n],{type:"application/json"}),t=URL.createObjectURL(s),e=document.createElement("a");e.href=t,e.download=`security-logs-${(new Date).toISOString().slice(0,19).replace(/[:]/g,"-")}.json`,document.body.appendChild(e),e.click(),document.body.removeChild(e),URL.revokeObjectURL(t),debug("数据文件已下载")}function clearData(){confirm("确定要清空所有监控数据吗？此操作不可撤销。")&&(window.TrajectoryTracker&&window.TrajectoryTracker.clearData(),updateDashboard(),document.getElementById("data-preview").textContent="数据已清空",debug("监控数据已清空"))}function refreshStats(){updateDashboard(),debug("统计已刷新")}function toggleMonitoring(){const e=document.getElementById("enable-monitoring").checked;window.TrajectoryTracker&&(window.TrajectoryTracker.config.enabled=e,e?(window.TrajectoryTracker.init(),debug("监控已启用")):debug("监控已暂停"))}function updateSampleInterval(){const e=document.getElementById("sample-interval").value;document.getElementById("interval-value").textContent=e,window.TrajectoryTracker&&(window.TrajectoryTracker.config.sampleInterval=parseInt(e),debug(`采样间隔: ${e}ms`))}function updateMaxRecords(){const e=document.getElementById("max-records").value;window.TrajectoryTracker&&(window.TrajectoryTracker.config.maxRecords=parseInt(e),debug(`最大记录数: ${e}`))}function updateConfigDisplay(){if(window.TrajectoryTracker){const e=document.getElementById("sample-interval"),t=document.getElementById("interval-value"),n=document.getElementById("max-records");e&&t&&(e.value=window.TrajectoryTracker.config.sampleInterval,t.textContent=window.TrajectoryTracker.config.sampleInterval),n&&(n.value=window.TrajectoryTracker.config.maxRecords)}}document.addEventListener("DOMContentLoaded",initDashboard),window.addEventListener("beforeunload",()=>{updateInterval&&(clearInterval(updateInterval),debug("实时更新已停止"))}),document.addEventListener("keydown",e=>{e.ctrlKey&&e.shiftKey&&e.key==="R"&&(e.preventDefault(),location.reload(!0))})</script></body></html>
