<!DOCTYPE html>
<html lang="zh-CN">
<head><script src="/knowledge-planet/livereload.js?mindelay=10&amp;v=2&amp;port=1313&amp;path=knowledge-planet/livereload" data-no-instant defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags - 知识星球</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #ffffff;
            --text-color: #333333;
            --border-color: #e5e7eb;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <a href="/">✨ 知识星球</a>
            </div>
            <ul class="nav-links">
                <li><a href="/">首页</a></li>
                <li><a href="/posts/">文章</a></li>
                <li><a href="/categories/">分类</a></li>
                <li><a href="/tags/">标签</a></li>
                <li><a href="/about/">关于</a></li>
            </ul>
        </nav>
    </header>

    <main>
        
<div class="container">
    <div class="hero">
        <h1>欢迎来到知识星球</h1>
        <p class="subtitle">记录 • 分享 • 成长</p>
        <p>这里是我整理和分享知识的地方，用文字记录思考的轨迹。</p>
    </div>

    <div class="content-grid">
        <section class="recent-posts">
            <h2><i class="fas fa-newspaper"></i> 最新文章</h2>
            
        </section>

        <aside class="sidebar">
            <div class="sidebar-card">
                <h3><i class="fas fa-user"></i> 关于作者</h3>
                <p>知识探索者，喜欢记录和分享学习心得。</p>
            </div>
            
            <div class="sidebar-card">
                <h3><i class="fas fa-tags"></i> 热门标签</h3>
                <div class="tag-cloud">
                    <a href="/tags/技术/">技术</a>
                    <a href="/tags/学习/">学习</a>
                    <a href="/tags/生活/">生活</a>
                    <a href="/tags/Markdown/">Markdown</a>
                </div>
            </div>
            
            <div class="sidebar-card">
                <h3><i class="fas fa-search"></i> 搜索</h3>
                <div class="search-box">
                    <input type="text" placeholder="搜索文章...">
                    <button><i class="fas fa-search"></i></button>
                </div>
            </div>
        </aside>
    </div>
</div>

    </main>

    <footer>
        <div class="footer-content">
            <p>© 2026 知识星球 - 用文字记录思考</p>
            <div class="social-links">
                <a href="#" title="分享到Twitter"><i class="fab fa-twitter"></i></a>
                <a href="#" title="分享到LinkedIn"><i class="fab fa-linkedin"></i></a>
                <a href="#" title="分享到Reddit"><i class="fab fa-reddit"></i></a>
            </div>
        </div>
    </footer>

    
    <div id="comments"></div>
    
    <script>
        
        document.addEventListener('DOMContentLoaded', function() {
            
            const shareButtons = document.querySelectorAll('.share-btn');
            shareButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    const url = window.location.href;
                    const title = document.title;
                    const platform = this.dataset.platform;
                    
                    let shareUrl = '';
                    switch(platform) {
                        case 'twitter':
                            shareUrl = `https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=${encodeURIComponent(title)}`;
                            break;
                        case 'linkedin':
                            shareUrl = `https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(url)}`;
                            break;
                        case 'reddit':
                            shareUrl = `https://reddit.com/submit?url=${encodeURIComponent(url)}&title=${encodeURIComponent(title)}`;
                            break;
                    }
                    
                    if(shareUrl) {
                        window.open(shareUrl, '_blank', 'width=600,height=400');
                    }
                });
            });
        });
    </script>
</body>
</html>
