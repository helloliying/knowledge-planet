<!doctype html><html lang=zh-CN><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1"><title>简易监控仪表板 - 知识星球</title><style>body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;margin:20px;background:#f5f5f5}.container{max-width:1200px;margin:0 auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.1)}h1{color:#333;text-align:center}.status{background:#4caf50;color:#fff;padding:10px;border-radius:5px;text-align:center;margin:20px 0}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin:20px 0}.stat-box{background:#e3f2fd;padding:15px;border-radius:8px;text-align:center;border-left:4px solid #2196f3}.stat-value{font-size:24px;font-weight:700;color:#2196f3}.stat-label{color:#666;font-size:14px;margin-top:5px}.chart-container{margin:30px 0;padding:20px;background:#fafafa;border-radius:8px}.controls{background:#fff8e1;padding:15px;border-radius:8px;margin:20px 0}button{padding:10px 20px;margin:5px;border:none;border-radius:5px;cursor:pointer;font-weight:700}.btn-primary{background:#2196f3;color:#fff}.btn-secondary{background:#f5f5f5;color:#333}#data-output{background:#333;color:#0f0;padding:15px;border-radius:5px;font-family:monospace;max-height:300px;overflow-y:auto;margin-top:20px}</style></head><body><div class=container><h1>🔍 简易安全监控仪表板</h1><div class=status><span id=live-indicator>●</span> 监控系统运行中</div><div class=stats id=live-stats></div><div class=chart-container><h3>鼠标轨迹图</h3><canvas id=trajectory-chart width=800 height=300></canvas></div><div class=controls><h3>数据管理</h3><button onclick=startTracking() class=btn-primary>开始跟踪</button>
<button onclick=stopTracking() class=btn-secondary>停止跟踪</button>
<button onclick=exportData() class=btn-primary>导出数据</button>
<button onclick=clearData() class=btn-secondary>清空数据</button>
<button onclick=simulateData() class=btn-secondary>模拟数据</button></div><div><h3>数据输出</h3><pre id=data-output>等待数据...</pre></div><div style=margin-top:30px;font-size:12px;color:#666><p>🔧 调试信息:</p><p id=debug-info>正在初始化...</p></div></div><script src=https://cdn.jsdelivr.net/npm/chart.js></script><script>let trajectoryData=[],trackingActive=!1,chart=null,updateInterval=null;function debug(e){console.log("[DEBUG]",e),document.getElementById("debug-info").textContent=e}function init(){if(debug("初始化仪表板..."),typeof Chart=="undefined"){debug("❌ Chart.js 未加载");return}debug("✅ Chart.js 已加载"),initChart(),updateStats(),debug("仪表板初始化完成")}function initChart(){const e=document.getElementById("trajectory-chart").getContext("2d");chart=new Chart(e,{type:"scatter",data:{datasets:[{label:"鼠标轨迹",data:[],backgroundColor:"rgba(33, 150, 243, 0.5)",borderColor:"rgba(33, 150, 243, 1)",borderWidth:1,pointRadius:4}]},options:{responsive:!1,scales:{x:{type:"linear",position:"bottom",title:{display:!0,text:"X坐标"},min:0,max:window.innerWidth},y:{reverse:!0,title:{display:!0,text:"Y坐标"},min:0,max:window.innerHeight}}}}),debug("图表初始化完成")}function startTracking(){if(trackingActive)return;debug("开始跟踪鼠标轨迹..."),trackingActive=!0,document.addEventListener("mousemove",handleMouseMove),updateInterval=setInterval(updateChart,500),debug("跟踪已启动")}function stopTracking(){if(!trackingActive)return;debug("停止跟踪..."),trackingActive=!1,document.removeEventListener("mousemove",handleMouseMove),updateInterval&&(clearInterval(updateInterval),updateInterval=null),debug("跟踪已停止")}function handleMouseMove(e){const t={x:e.clientX,y:e.clientY,t:Date.now()};trajectoryData.push(t),trajectoryData.length>100&&(trajectoryData=trajectoryData.slice(-100))}function updateChart(){if(!chart||trajectoryData.length===0)return;chart.data.datasets[0].data=trajectoryData.map(e=>({x:e.x,y:e.y})),chart.update("none"),updateStats()}function updateStats(){const e=document.getElementById("live-stats");if(!e)return;e.innerHTML=`
                <div class="stat-box">
                    <div class="stat-value">${trajectoryData.length}</div>
                    <div class="stat-label">轨迹点数</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">${trackingActive?"运行中":"已停止"}</div>
                    <div class="stat-label">跟踪状态</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">${window.innerWidth}×${window.innerHeight}</div>
                    <div class="stat-label">窗口尺寸</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">${navigator.userAgent.substring(0,20)}...</div>
                    <div class="stat-label">用户代理</div>
                </div>
            `}function exportData(){const e={metadata:{exportedAt:(new Date).toISOString(),page:window.location.href,dataPoints:trajectoryData.length,trackingActive},trajectory:trajectoryData},t=JSON.stringify(e,null,2);document.getElementById("data-output").textContent=t,debug("数据已导出")}function clearData(){confirm("确定要清空所有数据吗？")&&(trajectoryData=[],chart&&(chart.data.datasets[0].data=[],chart.update("none")),updateStats(),document.getElementById("data-output").textContent="数据已清空",debug("数据已清空"))}function simulateData(){debug("生成模拟数据...");for(let e=0;e<50;e++)trajectoryData.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,t:Date.now()-Math.random()*1e4});updateChart(),debug("模拟数据已生成")}document.addEventListener("DOMContentLoaded",init),setTimeout(()=>{startTracking(),debug("自动开始跟踪")},1e3)</script></body></html>
