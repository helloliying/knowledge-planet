<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} - 知识星球</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #ffffff;
            --text-color: #333333;
            --border-color: #e5e7eb;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <a href="/">✨ 知识星球</a>
            </div>
            <ul class="nav-links">
                <li><a href="/">首页</a></li>
                <li><a href="/posts/">文章</a></li>
                <li><a href="/categories/">分类</a></li>
                <li><a href="/tags/">标签</a></li>
                <li><a href="/about/">关于</a></li>
            </ul>
        </nav>
    </header>

    <main>
        {{ block "main" . }}{{ end }}
    </main>

    <footer>
        <div class="footer-content">
            <p>© {{ now.Format "2006" }} 知识星球 - 用文字记录思考</p>
            <div class="social-links">
                <a href="#" title="分享到Twitter"><i class="fab fa-twitter"></i></a>
                <a href="#" title="分享到LinkedIn"><i class="fab fa-linkedin"></i></a>
                <a href="#" title="分享到Reddit"><i class="fab fa-reddit"></i></a>
            </div>
        </div>
    </footer>

    <!-- 评论系统占位 -->
    <div id="comments"></div>
    
    <script>
        // 简单的分享功能
        document.addEventListener('DOMContentLoaded', function() {
            // 分享按钮功能
            const shareButtons = document.querySelectorAll('.share-btn');
            shareButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    const url = window.location.href;
                    const title = document.title;
                    const platform = this.dataset.platform;
                    
                    let shareUrl = '';
                    switch(platform) {
                        case 'twitter':
                            shareUrl = `https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=${encodeURIComponent(title)}`;
                            break;
                        case 'linkedin':
                            shareUrl = `https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(url)}`;
                            break;
                        case 'reddit':
                            shareUrl = `https://reddit.com/submit?url=${encodeURIComponent(url)}&title=${encodeURIComponent(title)}`;
                            break;
                    }
                    
                    if(shareUrl) {
                        window.open(shareUrl, '_blank', 'width=600,height=400');
                    }
                });
            });
        });
    </script>
</body>
</html>
