<!doctype html><html lang=zh-CN><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1"><title>安全监控仪表板 - 知识星球</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding:20px}.dashboard-container{max-width:1400px;margin:0 auto}.dashboard-header{background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);border-radius:16px;padding:2rem;margin-bottom:2rem;border:1px solid #334155}.dashboard-header h1{font-size:2.5rem;margin-bottom:.5rem;background:linear-gradient(90deg,#60a5fa,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.dashboard-header p{color:#94a3b8;font-size:1.1rem}.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1.5rem;margin-bottom:2rem}.stat-card{background:#1e293b;border-radius:12px;padding:1.5rem;border:1px solid #334155;transition:transform .3s}.stat-card:hover{transform:translateY(-5px);border-color:#60a5fa}.stat-card h3{color:#94a3b8;font-size:.9rem;margin-bottom:.5rem}.stat-value{font-size:2.5rem;font-weight:700;color:#60a5fa}.chart-container{background:#1e293b;border-radius:12px;padding:1.5rem;margin-bottom:2rem;border:1px solid #334155}.chart-container h2{margin-bottom:1rem;color:#e2e8f0}#trajectory-chart{width:100%;height:250px}#distribution-chart{width:100%;height:150px}.controls-panel{background:#1e293b;border-radius:12px;padding:1.5rem;margin-bottom:2rem;border:1px solid #334155}.btn{display:inline-block;padding:.8rem 1.5rem;border:none;border-radius:8px;font-weight:600;cursor:pointer;transition:all .3s;margin-right:.5rem;margin-bottom:.5rem}.btn-primary{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff}.btn-primary:hover{opacity:.9}.btn-secondary{background:#334155;color:#e2e8f0}.btn-secondary:hover{background:#475569}.data-preview{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:1rem;font-family:monaco,consolas,monospace;font-size:.9rem;max-height:200px;overflow-y:auto;margin-top:1rem}@media(max-width:768px){.stats-grid{grid-template-columns:1fr}#distribution-chart{height:130px}}</style></head><body><div class=dashboard-container><div class=dashboard-header><h1>🔒 安全监控仪表板</h1><p>试验环境 - 完整行为记录</p></div><div class=stats-grid id=live-stats></div><div class=chart-container><h2>📈 鼠标轨迹</h2><canvas id=trajectory-chart></canvas></div><div class=chart-container><h2>📊 事件类型分布</h2><canvas id=distribution-chart></canvas></div><div class=controls-panel><h2>🎮 数据管理</h2><div><button onclick=exportData() class="btn btn-primary">导出数据</button>
<button onclick=downloadData() class="btn btn-primary">下载文件</button>
<button onclick=clearData() class="btn btn-secondary">清空数据</button>
<button onclick=refreshStats() class="btn btn-secondary">刷新统计</button></div><div><h3>数据预览</h3><div class=data-preview id=data-preview>点击"导出数据"查看完整数据</div></div></div></div><script src="../js/security-monitor.js?v=20260319.1709"></script><script src="../js/trajectory-tracker.js?v=20260319.1709"></script><script src=https://cdn.jsdelivr.net/npm/chart.js></script><script>let trajectoryChart=null,distributionChart=null,updateInterval=null;function initDashboard(){if(console.log("🚀 初始化仪表板..."),typeof Chart=="undefined"){console.error("Chart.js未加载");return}if(!window.TrajectoryTracker){console.error("轨迹跟踪器未加载");return}try{window.KnowledgePlanetSecurity&&window.KnowledgePlanetSecurity.init(),window.TrajectoryTracker.init(),console.log("✅ 监控系统已启动")}catch(e){console.error("初始化错误:",e);return}initCharts(),startLiveUpdates(),console.log("✅ 仪表板准备就绪")}function initCharts(){const e=document.getElementById("trajectory-chart").getContext("2d");trajectoryChart=new Chart(e,{type:"scatter",data:{datasets:[{label:"鼠标轨迹",data:[],backgroundColor:"rgba(96, 165, 250, 0.3)",borderColor:"rgba(96, 165, 250, 0.8)",borderWidth:1,pointRadius:2}]},options:{responsive:!0,maintainAspectRatio:!1,scales:{x:{type:"linear",position:"bottom",grid:{color:"#334155"},ticks:{color:"#94a3b8"}},y:{reverse:!0,grid:{color:"#334155"},ticks:{color:"#94a3b8"}}},plugins:{legend:{display:!1}}}});const t=document.getElementById("distribution-chart").getContext("2d");distributionChart=new Chart(t,{type:"doughnut",data:{labels:["鼠标移动","点击","滚动","键盘","其他"],datasets:[{data:[0,0,0,0,0],backgroundColor:["#60a5fa","#10b981","#f59e0b","#8b5cf6","#64748b"],borderWidth:0}]},options:{responsive:!0,maintainAspectRatio:!1,plugins:{legend:{position:"bottom",labels:{color:"#94a3b8",font:{size:10}}}}}}),console.log("✅ 图表初始化完成")}function startLiveUpdates(){updateInterval&&clearInterval(updateInterval),updateInterval=setInterval(updateDashboard,1e3),updateDashboard(),console.log("✅ 实时更新已启动")}function updateDashboard(){if(!window.TrajectoryTracker)return;const e=window.TrajectoryTracker.getStats(),t=window.TrajectoryTracker.getStream();updateStatsCards(e),updateTrajectoryChart(t),updateDistributionChart(e)}function updateStatsCards(e){const t=document.getElementById("live-stats");if(!t)return;t.innerHTML=`
            <div class="stat-card">
                <h3>轨迹记录</h3>
                <div class="stat-value">${e.moves||0}</div>
            </div>
            <div class="stat-card">
                <h3>点击事件</h3>
                <div class="stat-value">${e.clicks||0}</div>
            </div>
            <div class="stat-card">
                <h3>滚动事件</h3>
                <div class="stat-value">${e.scrolls||0}</div>
            </div>
            <div class="stat-card">
                <h3>可疑行为</h3>
                <div class="stat-value">${e.suspicious||0}</div>
            </div>
        `}function updateTrajectoryChart(e){if(!trajectoryChart||!e||e.length===0)return;const t=e.slice(-50),n=t.map(e=>({x:e.x,y:e.y}));trajectoryChart.data.datasets[0].data=n,trajectoryChart.update("none")}function updateDistributionChart(e){if(!distributionChart)return;distributionChart.data.datasets[0].data=[e.moves||0,e.clicks||0,e.scrolls||0,0,Math.max(0,e.totalRecords-(e.moves+e.clicks+e.scrolls))],distributionChart.update("none")}function exportData(){if(!window.TrajectoryTracker){alert("轨迹跟踪器未初始化");return}const t=window.TrajectoryTracker.exportData(),e=document.getElementById("data-preview");e&&(e.textContent=t,e.scrollTop=0),navigator.clipboard.writeText(t).then(()=>{console.log("✅ 数据已复制到剪贴板")}).catch(e=>{console.error("❌ 复制失败:",e)})}function downloadData(){if(!window.TrajectoryTracker)return;const n=window.TrajectoryTracker.exportData(),s=new Blob([n],{type:"application/json"}),t=URL.createObjectURL(s),e=document.createElement("a");e.href=t,e.download=`security-logs-${(new Date).toISOString().slice(0,19).replace(/[:]/g,"-")}.json`,document.body.appendChild(e),e.click(),document.body.removeChild(e),URL.revokeObjectURL(t),console.log("✅ 数据文件已下载")}function clearData(){confirm("确定要清空所有监控数据吗？此操作不可撤销。")&&(window.TrajectoryTracker&&window.TrajectoryTracker.clearData(),updateDashboard(),document.getElementById("data-preview").textContent="数据已清空",console.log("✅ 监控数据已清空"))}function refreshStats(){updateDashboard(),console.log("✅ 统计已刷新")}document.addEventListener("DOMContentLoaded",initDashboard),window.addEventListener("beforeunload",()=>{updateInterval&&(clearInterval(updateInterval),console.log("🛑 实时更新已停止"))}),document.addEventListener("keydown",e=>{e.ctrlKey&&e.shiftKey&&e.key==="R"&&(e.preventDefault(),location.reload(!0))})</script></body></html>
