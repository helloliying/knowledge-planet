<!doctype html><html lang=zh-CN><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1"><title>安全监控仪表板 - 知识星球</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:linear-gradient(135deg,#f5f7fa 0%,#c3cfe2 100%);color:#2d3748;min-height:100vh;padding:15px;margin:0}.dashboard-container{max-width:1200px;margin:0 auto;background:rgba(255,255,255,.95);border-radius:20px;padding:25px;box-shadow:0 10px 40px rgba(0,0,0,.1);backdrop-filter:blur(10px)}.dashboard-header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem;border:none;color:#fff;position:relative;overflow:hidden}.dashboard-header::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,255,255,.1) 1px,transparent 1px);background-size:20px 20px;opacity:.3}.dashboard-header h1{font-size:1.8rem;margin-bottom:.3rem;color:#fff;font-weight:700}.dashboard-header p{color:rgba(255,255,255,.9);font-size:.95rem;margin-bottom:.5rem}.status-badge{display:inline-block;background:#10b981;color:#fff;padding:.3rem .8rem;border-radius:20px;font-size:.9rem;margin-top:.5rem}.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1.5rem}.stat-card{background:#fff;border-radius:12px;padding:1.2rem;border:1px solid #e2e8f0;transition:all .3s ease;box-shadow:0 4px 6px rgba(0,0,0,5%)}.stat-card:hover{transform:translateY(-3px);box-shadow:0 8px 15px rgba(0,0,0,.1);border-color:#667eea}.stat-card h3{color:#718096;font-size:.85rem;margin-bottom:.5rem;font-weight:500;text-transform:uppercase;letter-spacing:.5px}.stat-value{font-size:2rem;font-weight:700;color:#4a5568;line-height:1}.chart-container{background:#fff;border-radius:12px;padding:1.2rem;margin-bottom:1.5rem;border:1px solid #e2e8f0;box-shadow:0 4px 12px rgba(0,0,0,5%)}.chart-container h2{margin-bottom:.8rem;color:#4a5568;font-size:1.2rem;font-weight:600}#trajectory-chart{width:100%;height:250px;max-height:250px}#distribution-chart{width:100%;height:200px;max-height:200px}@media(max-width:768px){#trajectory-chart{height:200px}#distribution-chart{height:180px}}.controls-panel{background:#fff;border-radius:12px;padding:1.2rem;margin-bottom:1.5rem;border:1px solid #e2e8f0;box-shadow:0 4px 12px rgba(0,0,0,5%)}.btn{display:inline-block;padding:.7rem 1.2rem;border:none;border-radius:8px;font-weight:600;cursor:pointer;transition:all .3s;margin-right:.5rem;margin-bottom:.5rem;font-size:.9rem}.btn-primary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;box-shadow:0 4px 6px rgba(102,126,234,.2)}.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 12px rgba(102,126,234,.3)}.btn-secondary{background:#f7fafc;color:#4a5568;border:1px solid #e2e8f0}.btn-secondary:hover{background:#edf2f7;border-color:#cbd5e0}.data-preview{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:1rem;margin-top:1rem;max-height:300px;overflow-y:auto;font-family:monaco,consolas,monospace;font-size:.85rem}.config-item{margin-bottom:1rem;padding:1rem;background:#0f172a;border-radius:8px}.config-item label{display:block;margin-bottom:.5rem;color:#94a3b8}.config-item input[type=range]{width:100%;margin:.5rem 0}.live-indicator{display:inline-block;width:10px;height:10px;background:#10b981;border-radius:50%;margin-right:.5rem;animation:pulse 2s infinite}@keyframes pulse{0%{opacity:1}50%{opacity:.5}100%{opacity:1}}@media(max-width:768px){.stats-grid{grid-template-columns:1fr}.dashboard-header h1{font-size:2rem}}</style></head><body><div class=dashboard-container><header class=dashboard-header><h1>🔒 安全监控仪表板</h1><p>试验环境 - 完整行为记录模式</p><div class=status-badge><span class=live-indicator></span>
实时监控中</div></header><div class=stats-grid id=live-stats></div><div class=chart-container><h2>📈 鼠标轨迹可视化</h2><canvas id=trajectory-chart></canvas></div><div class=chart-container><h2>📊 事件类型分布</h2><canvas id=distribution-chart></canvas></div><div class=controls-panel><h2>🎮 数据管理</h2><div><button onclick=exportData() class="btn btn-primary">导出数据 (JSON)</button>
<button onclick=clearData() class="btn btn-secondary">清空数据</button>
<button onclick=refreshStats() class="btn btn-secondary">刷新统计</button>
<button onclick=downloadData() class="btn btn-primary">下载文件</button></div><div style=margin-top:1rem><h3>数据预览</h3><div class=data-preview id=data-preview>点击"导出数据"查看完整数据</div></div></div><div class=controls-panel><h2>⚙️ 监控配置</h2><div class=config-item><label><input type=checkbox id=enable-monitoring checked onchange=toggleMonitoring()>
启用完整监控</label></div><div class=config-item><label>采样间隔: <span id=interval-value>20</span>ms
<input type=range id=sample-interval min=10 max=100 value=20 oninput=updateSampleInterval()></label></div><div class=config-item><label>最大记录数:
<input type=number id=max-records value=10000 min=100 max=50000 onchange=updateMaxRecords()></label></div></div></div><script src=../js/security-monitor.js></script><script src=../js/trajectory-tracker.js></script><script src=https://cdn.jsdelivr.net/npm/chart.js></script><script>let trajectoryChart=null,distributionChart=null,updateInterval=null;function initDashboard(){if(console.log("🔧 初始化安全监控仪表板..."),console.log("📁 脚本加载状态:",{KnowledgePlanetSecurity:!!window.KnowledgePlanetSecurity,TrajectoryTracker:!!window.TrajectoryTracker,Chart:typeof Chart!="undefined"}),window.KnowledgePlanetSecurity)try{window.KnowledgePlanetSecurity.init(),console.log("✅ 安全监控系统已启动")}catch(e){console.error("❌ 安全监控初始化失败:",e)}else console.warn("⚠️ 安全监控脚本未加载");if(window.TrajectoryTracker)try{window.TrajectoryTracker.init(),console.log("✅ 轨迹跟踪器已启动"),setTimeout(()=>{const t=window.TrajectoryTracker.getStats(),e=window.TrajectoryTracker.getStream();console.log("📊 初始数据:",{stats:t,streamLength:e.length,streamSample:e.slice(0,3)})},100)}catch(e){console.error("❌ 轨迹跟踪器初始化失败:",e)}else console.error("❌ 轨迹跟踪器脚本未加载");initCharts(),startLiveUpdates(),updateConfigDisplay(),console.log("🚀 仪表板初始化完成")}function initCharts(){console.log("📊 初始化图表...");const e=document.getElementById("trajectory-chart");if(e){const t=e.getContext("2d");trajectoryChart=new Chart(t,{type:"scatter",data:{datasets:[{label:"鼠标轨迹",data:[],backgroundColor:"rgba(96, 165, 250, 0.5)",borderColor:"rgba(96, 165, 250, 1)",borderWidth:1,pointRadius:3}]},options:{responsive:!0,scales:{x:{type:"linear",position:"bottom",title:{display:!0,text:"X坐标 (像素)",color:"#94a3b8"},grid:{color:"#334155"},ticks:{color:"#94a3b8"}},y:{reverse:!0,title:{display:!0,text:"Y坐标 (像素)",color:"#94a3b8"},grid:{color:"#334155"},ticks:{color:"#94a3b8"}}},plugins:{legend:{labels:{color:"#94a3b8"}}}}})}const t=document.getElementById("distribution-chart");if(t){const e=t.getContext("2d");distributionChart=new Chart(e,{type:"pie",data:{labels:["鼠标移动","点击事件","滚动事件","键盘事件","其他事件"],datasets:[{data:[0,0,0,0,0],backgroundColor:["#60a5fa","#10b981","#f59e0b","#8b5cf6","#64748b"]}]},options:{responsive:!0,plugins:{legend:{position:"bottom",labels:{color:"#94a3b8"}}}}})}}function startLiveUpdates(){updateInterval&&clearInterval(updateInterval),updateInterval=setInterval(updateDashboard,1e3),updateDashboard(),console.log("🔄 实时更新已启动")}function updateDashboard(){if(!window.TrajectoryTracker){console.warn("⚠️ 轨迹跟踪器未找到");return}const e=window.TrajectoryTracker.getStats(),t=window.TrajectoryTracker.getStream();updateStatsCards(e),updateTrajectoryChart(t),updateDistributionChart(e)}function updateStatsCards(e){const t=document.getElementById("live-stats");if(!t)return;t.innerHTML=`
                <div class="stat-card">
                    <h3>轨迹记录</h3>
                    <div class="stat-value">${e.moves||0}</div>
                    <small>鼠标移动事件</small>
                </div>
                <div class="stat-card">
                    <h3>点击事件</h3>
                    <div class="stat-value">${e.clicks||0}</div>
                    <small>鼠标点击事件</small>
                </div>
                <div class="stat-card">
                    <h3>滚动事件</h3>
                    <div class="stat-value">${e.scrolls||0}</div>
                    <small>页面滚动事件</small>
                </div>
                <div class="stat-card">
                    <h3>可疑行为</h3>
                    <div class="stat-value">${e.suspicious||0}</div>
                    <small>检测到的异常</small>
                </div>
            `}function updateTrajectoryChart(e){if(!trajectoryChart||!e||e.length===0)return;const t=e.slice(-50),n=t.map(e=>({x:e.x,y:e.y}));trajectoryChart.data.datasets[0].data=n,trajectoryChart.update("none")}function updateDistributionChart(e){if(!distributionChart)return;distributionChart.data.datasets[0].data=[e.moves||0,e.clicks||0,e.scrolls||0,0,Math.max(0,e.totalRecords-(e.moves+e.clicks+e.scrolls))],distributionChart.update("none")}function exportData(){if(!window.TrajectoryTracker){alert("轨迹跟踪器未初始化");return}const t=window.TrajectoryTracker.exportData(),e=document.getElementById("data-preview");e&&(e.textContent=t,e.scrollTop=0),navigator.clipboard.writeText(t).then(()=>{console.log("✅ 数据已复制到剪贴板")}).catch(e=>{console.error("❌ 复制失败:",e)})}function downloadData(){if(!window.TrajectoryTracker)return;const n=window.TrajectoryTracker.exportData(),s=new Blob([n],{type:"application/json"}),t=URL.createObjectURL(s),e=document.createElement("a");e.href=t,e.download=`security-logs-${(new Date).toISOString().slice(0,19).replace(/[:]/g,"-")}.json`,document.body.appendChild(e),e.click(),document.body.removeChild(e),URL.revokeObjectURL(t),console.log("📥 数据文件已下载")}function clearData(){if(confirm("确定要清空所有监控数据吗？此操作不可撤销。")){window.TrajectoryTracker&&window.TrajectoryTracker.clearData(),updateDashboard();const e=document.getElementById("data-preview");e&&(e.textContent="数据已清空"),console.log("🗑️ 监控数据已清空")}}function refreshStats(){updateDashboard(),console.log("🔄 统计已刷新")}function toggleMonitoring(){const e=document.getElementById("enable-monitoring").checked;window.TrajectoryTracker&&(window.TrajectoryTracker.config.enabled=e,e?(window.TrajectoryTracker.init(),console.log("✅ 监控已启用")):console.log("⏸️ 监控已暂停")),window.KnowledgePlanetSecurity&&(window.KnowledgePlanetSecurity.config.enabled=e)}function updateSampleInterval(){const e=document.getElementById("sample-interval").value,t=document.getElementById("interval-value");t&&(t.textContent=e),window.TrajectoryTracker&&(window.TrajectoryTracker.config.sampleInterval=parseInt(e),console.log(`📏 采样间隔已更新: ${e}ms`))}function updateMaxRecords(){const e=document.getElementById("max-records").value;window.TrajectoryTracker&&(window.TrajectoryTracker.config.maxRecords=parseInt(e),console.log(`📈 最大记录数已更新: ${e}`))}function updateConfigDisplay(){if(window.TrajectoryTracker){const e=document.getElementById("sample-interval"),t=document.getElementById("interval-value"),n=document.getElementById("max-records");e&&t&&(e.value=window.TrajectoryTracker.config.sampleInterval,t.textContent=window.TrajectoryTracker.config.sampleInterval),n&&(n.value=window.TrajectoryTracker.config.maxRecords)}}document.addEventListener("DOMContentLoaded",initDashboard),window.addEventListener("beforeunload",()=>{updateInterval&&(clearInterval(updateInterval),console.log("🛑 实时更新已停止"))})</script></body></html>
